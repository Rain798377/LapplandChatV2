services:
  lappland:
    build: .
    environment:
      GROQ_API_KEY: REPLACE_WITH_YOUR_GROQ_API_KEY
      DISCORD_TOKEN: REPLACE_WITH_YOUR_DISCORD_TOKEN
      SPOTIFY_CLIENT_ID: REPLACE_WITH_YOUR_CLIENT_ID
      SPOTIFY_CLIENT_SECRET: REPLACE_WITH_YOUR_CLIENT_SECRET
      SPOTIFY_REDIRECT_URI: REPLACE_WITH_YOUR_REDIRECT_URI
      PYTHONUNBUFFERED: 1
    container_name: lappland
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ./data:/app/data